            <h2>Add New Course</h2>
            <p>Use the form below to add a new course to your list. Make sure to fill in all the required fields.</p>
            <form class="form-group">
                <labal for="add course">Course Name:</labal>
                <input type="text" id="course-name" name="course-name" required><br><br>
                <labal for="add course">Instructor:</labal>
                <input type="text" id="instructor" name="instructor" required><br><br>
                <labal for="add course">Credit Hours:</labal>
                <input type="number" id="credit-hours" name="credit-hours"  min="1" max="4" required><br><br>
                <button type="submit">Add Course</button>
            </form>
